<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Radial Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#28023d" />
      <stop offset="70%" stop-color="#0e0117" />
      <stop offset="100%" stop-color="#040008" />
    </radialGradient>

    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Circular Border and Outer Rim -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#1a0429" stroke-width="10" />
  <circle cx="256" cy="256" r="230" fill="none" stroke="#d900ff" stroke-width="4" opacity="0.3" filter="url(#neonGlow)" />
  <circle cx="256" cy="256" r="230" fill="none" stroke="#ff007f" stroke-width="1" />

  <!-- Neon Text Paths Group -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Glow Layer (Thick, Colored, Blurred) -->
    <g stroke="#ff007f" stroke-width="26" fill="none" filter="url(#neonGlow)" opacity="0.85">
      <path d="M 145 180 L 145 310 L 195 310" />
      <path d="M 230 180 L 230 280 A 25 25 0 0 0 280 280 L 280 180" />
      <path d="M 310 180 L 370 310" />
      <path d="M 370 180 L 335 240 L 360 245 L 320 310" />
    </g>

    <!-- Mid Glow Layer (Medium, Violet) -->
    <g stroke="#d900ff" stroke-width="14" fill="none" opacity="0.9">
      <path d="M 145 180 L 145 310 L 195 310" />
      <path d="M 230 180 L 230 280 A 25 25 0 0 0 280 280 L 280 180" />
      <path d="M 310 180 L 370 310" />
      <path d="M 370 180 L 335 240 L 360 245 L 320 310" />
    </g>

    <!-- Core Glow Layer (Thin, White/Light Pink) -->
    <g stroke="#ffffff" stroke-width="6" fill="none">
      <path d="M 145 180 L 145 310 L 195 310" />
      <path d="M 230 180 L 230 280 A 25 25 0 0 0 280 280 L 280 180" />
      <path d="M 310 180 L 370 310" />
      <path d="M 370 180 L 335 240 L 360 245 L 320 310" />
    </g>
  </g>
</svg>
